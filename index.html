<!DOCTYPE html5>
<html>
<head>
	<meta charset="utf-8" content="width=device-width,initial-scale=1.0,minimum-scale=0.5,maximum-scale=1.0,user-scalable=no" />
	<title>网站收藏</title>
	<link rel="stylesheet" href="./css/index.css">
	<!-- <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script> -->
	
</head>
<body>	
	<div id="root">
		<div id="page">
			<div id="h1">
				<h1>网站收藏</h1>
			</div>
			<div v-if="loading" class="loading">加载中...</div>
			<div v-else-if="error" class="error">{{error}}</div>
			<div v-else>
				<div class="classify" v-for="items in urls">
					<div class="Subheadings">{{items.kind}}</div>
					<div class="content">
						<a v-for="item in items.website" :href="item.url" target="_blank">{{item.name}}</a>
					</div>
				</div>
			</div>
		</div>
	</div>
	<script src="./js/vue.global.js"></script>
	<script>
		
		const { createApp } = Vue
		
		createApp({
			data() {
				return {
					urls: [],
					loading: true,
					error: null
				};
			},
			async mounted() {
				try {
					const response = await fetch('./static/data/urls.json');
					if (!response.ok) {
						throw new Error(`HTTP error! status: ${response.status}`);
					}
					const data = await response.json();
					this.urls = data;
				} catch (error) {
					console.error('加载数据失败:', error);
					this.error = '数据加载失败，请稍后重试';
				} finally {
					this.loading = false;
				}
			}
		}).mount("#root")

	</script>
</body>
</html>
